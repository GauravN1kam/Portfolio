  <!-- GN monogram -->
  <text x="256" y="266" text-anchor="middle" dominant-baseline="central"
        font-family="'Poppins', 'SF Pro Display', 'Segoe UI', Roboto, system-ui, sans-serif"
        font-size="205" font-weight="700" letter-spacing="-6" fill="#f2b134">GN</text>
</svg>
